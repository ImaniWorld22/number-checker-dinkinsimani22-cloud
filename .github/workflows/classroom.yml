name: Autograding Tests
'on':
  - push
  - repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Number Checker Test
        id: number-checker-test
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Number Checker Test
          setup-command: curl -O https://raw.githubusercontent.com/izdinkins/demo-number-test/main/test/NumberCheckerTest.java
            && javac -d . src/NumberChecker.java NumberCheckerTest.java
          command: java NumberCheckerTest
          timeout: 10
          max-score: 100
      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          NUMBER-CHECKER-TEST_RESULTS: "${{steps.number-checker-test.outputs.result}}"
        with:
          runners: number-checker-test